name: Build root-mcp Tarball

on:
  push:
    branches: [ main ]
    paths:
      - 'mcp/root-mcp/**'
  workflow_dispatch:
    inputs:
      mcp_version:
        description: 'root-mcp version to install from PyPI (e.g. 0.3.2)'
        required: true
      xrootd:
        description: 'Include the [xrootd] extra for remote file access'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site-packages tarball
        run: |
          VERSION="${{ github.event.inputs.mcp_version }}"
          XROOTD="${{ github.event.inputs.xrootd || 'false' }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          if [ -z "$VERSION" ]; then
            echo "ERROR: mcp_version input is required"
            exit 1
          fi

          EXTRA=""
          if [ "$XROOTD" = "true" ]; then
            EXTRA="[xrootd]"
            echo "XRootD extra enabled"
          fi

          mkdir -p staging/lib/python3.11/site-packages staging/bin

          # Full install: all deps land in site-packages. At runtime the LCG
          # view is sourced first so LCG's numpy/ROOT/uproot win on PYTHONPATH
          # (ABI-safe). Our site-packages are appended, providing root_mcp /
          # root_cli and any MCP-layer deps LCG doesn't ship.
          pip install \
            --target staging/lib/python3.11/site-packages \
            --upgrade \
            "root-mcp${EXTRA}==${VERSION}"

          # Write version marker
          echo "${VERSION}" > staging/VERSION

          # ------------------------------------------------------------------
          # Wrappers
          # LCG view path baked in at build time; override at deploy time by
          # passing LCG_VIEW to root-mcp-cvmfs-updater.sh (pypi/local modes).
          # ------------------------------------------------------------------
          LCG_VIEW="/cvmfs/sft.cern.ch/lcg/views/LCG_107/x86_64-el9-gcc13-opt"

          write_wrapper () {
            local name="$1"
            local module="$2"
            local func="$3"
            cat > "staging/bin/${name}" << WRAPPER
#!/usr/bin/env bash
# ${name} — CVMFS wrapper generated by build_root_mcp_tarball CI
#
# Sources the LCG view first so LCG's numpy/ROOT/uproot/etc. come first on
# PYTHONPATH (ABI-safe for PyROOT). Our site-packages are appended, adding
# root_mcp, root_cli, and any MCP-layer deps LCG doesn't ship.
set -e

_dir="\$(cd "\$(dirname "\$0")/.." && pwd)"
_view="${LCG_VIEW}"
_view_setup="\${_view}/setup.sh"

if [ ! -r "\${_view_setup}" ]; then
  echo "ERROR: LCG view not found at \${_view}" >&2
  echo "       Make sure /cvmfs/sft.cern.ch is mounted." >&2
  exit 1
fi

# shellcheck disable=SC1090
. "\${_view_setup}"

# Append (not prepend) so LCG's scientific stack takes precedence
export PYTHONPATH="\${PYTHONPATH:+\${PYTHONPATH}:}\${_dir}/lib/python3.11/site-packages"

exec python3 -c "import sys; from ${module} import ${func}; sys.exit(${func}() or 0)" "\$@"
WRAPPER
            chmod +x "staging/bin/${name}"
          }

          write_wrapper root-mcp "root_mcp.server" "main"
          write_wrapper root-cli "root_cli.main" "main"

          # ------------------------------------------------------------------
          # setup.sh
          # ------------------------------------------------------------------
          cat > staging/bin/setup.sh << 'SETUP'
#!/usr/bin/env bash
# root-mcp CVMFS setup — source to put root-mcp and root-cli on $PATH.
# Usage: source /cvmfs/sw.escape.eu/mcp/root-mcp/latest/bin/setup.sh

_rootmcp_dir="/cvmfs/sw.escape.eu/mcp/root-mcp/latest/bin"

case ":${PATH}:" in
  *":${_rootmcp_dir}:"*) ;;
  *) export PATH="${_rootmcp_dir}:${PATH}" ;;
esac

export ROOT_MCP_VERSION="$(cat "${_rootmcp_dir}/../VERSION" 2>/dev/null || echo unknown)"

echo "root-mcp v${ROOT_MCP_VERSION} ready  (root-mcp, root-cli on PATH)"

unset _rootmcp_dir
SETUP
          chmod +x staging/bin/setup.sh

          # ------------------------------------------------------------------
          # Smoke test: verify the packages are importable (no LCG/ROOT here,
          # just confirms the pip install worked and entry points resolve).
          # Full PyROOT test happens on the CVMFS publisher via the updater.
          # ------------------------------------------------------------------
          PYTHONPATH=staging/lib/python3.11/site-packages \
            python -c "import root_mcp, root_cli; print('root-mcp OK:', getattr(root_mcp, '__version__', '?'))"

          # ------------------------------------------------------------------
          # Verify wrapper syntax
          # ------------------------------------------------------------------
          bash -n staging/bin/root-mcp
          bash -n staging/bin/root-cli
          bash -n staging/bin/setup.sh
          echo "Wrapper syntax OK"

          # ------------------------------------------------------------------
          # Create tarball
          # ------------------------------------------------------------------
          cd staging
          tar -czf "../root-mcp-${VERSION}.tar.gz" .
          cd ..
          echo "Created root-mcp-${VERSION}.tar.gz ($(du -sh root-mcp-${VERSION}.tar.gz | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: root-mcp
          path: root-mcp-*.tar.gz
