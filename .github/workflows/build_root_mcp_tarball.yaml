name: Build root-mcp Tarball

on:
  push:
    branches: [ main ]
    paths:
      - 'mcp/root-mcp/**'
  workflow_dispatch:
    inputs:
      mcp_version:
        description: 'root-mcp version to install from PyPI (e.g. 0.3.2)'
        required: true
      xrootd:
        description: 'Include the [xrootd] extra'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build tarball
        run: |
          VERSION="${{ github.event.inputs.mcp_version }}"
          EXTRA=""
          [ "${{ github.event.inputs.xrootd }}" = "true" ] && EXTRA="[xrootd]"

          mkdir -p staging/lib/python3.11/site-packages
          pip install --target staging/lib/python3.11/site-packages "root-mcp${EXTRA}==${VERSION}"

          cp -r mcp/root-mcp/bin staging/bin
          echo "${VERSION}" > staging/VERSION

          tar -czf "root-mcp-${VERSION}.tar.gz" -C staging .
          echo "Built root-mcp-${VERSION}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: root-mcp
          path: root-mcp-*.tar.gz
