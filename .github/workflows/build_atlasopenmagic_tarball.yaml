name: Build ATLAS OpenMagic Tarball

on:
  push:
    branches: [ main ]
    paths:
      - 'atlasopenmagic/**'
  workflow_dispatch:
    inputs:
      atlasopenmagic_version:
        description: 'atlasopenmagic version from PyPI (empty = latest release)'
        required: false
        default: ''

jobs:
  build-tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python interpreters
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14

      - name: Build tarball
        run: |
          chmod +x ./atlasopenmagic/make_tarball.sh
          ./atlasopenmagic/make_tarball.sh "${{ github.event.inputs.atlasopenmagic_version }}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlasopenmagic
          path: atlasopenmagic/atlasopenmagic-*.tar.gz
