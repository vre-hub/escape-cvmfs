name: Build REANA Client Tarball

on:
  push:
    branches: [ main ]
    paths:
      - 'reana/**'
  workflow_dispatch:
    inputs:
      reana_version:
        description: 'REANA client version to build (e.g. 0.9.3)'
        required: false
        default: ''

jobs:
  build-tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libssl-dev tk-dev libffi-dev liblzma-dev uuid-dev \
            libgdbm-dev libnsl-dev git curl rsync unzip

      - name: Install Python toolchain via pyenv and run build
        run: |
          # Install pyenv
          curl https://pyenv.run | bash

          # Set up pyenv environment
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"

          # Install baseline Python used to bootstrap the script
          pyenv install -s 3.11.9
          pyenv global 3.11.9

          python --version

          # Make build script executable and run it
          chmod +x ./reana/make_tarball.sh
          ./reana/make_tarball.sh ${{ github.event.inputs.reana_version }}

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: reana-client
          path: reana/reana-client-*.tar.gz
