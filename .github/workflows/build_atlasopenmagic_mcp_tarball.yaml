name: Build atlasopenmagic-mcp Tarball

on:
  workflow_dispatch:
    inputs:
      mcp_version:
        description: 'atlasopenmagic-mcp version from PyPI'
        required: true
        default: '0.1.0'

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build tarball
        run: |
          VERSION="${{ github.event.inputs.mcp_version }}"

          mkdir -p staging/lib/python3.11/site-packages
          pip install --target staging/lib/python3.11/site-packages "atlasopenmagic-mcp==${VERSION}"

          cp -r mcp/atlasopenmagic-mcp/bin staging/bin
          echo "${VERSION}" > staging/VERSION

          tar -czf "atlasopenmagic-mcp-${VERSION}.tar.gz" -C staging .
          echo "Built atlasopenmagic-mcp-${VERSION}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: atlasopenmagic-mcp
          path: atlasopenmagic-mcp-*.tar.gz
